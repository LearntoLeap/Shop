<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quản trị — Learn to Leap Shop</title>
<meta name="robots" content="noindex, nofollow" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Be Vietnam Pro',system-ui,sans-serif}</style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
    <div class="text-center mb-6">
      <div class="w-14 h-14 mx-auto bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl flex items-center justify-center text-white text-2xl font-extrabold">🔒</div>
      <h1 class="text-2xl font-extrabold mt-3">Quản trị Shop LtL</h1>
      <p class="text-sm text-slate-500 mt-1">Đăng nhập bằng GitHub Personal Access Token</p>
    </div>

    <div class="space-y-3">
      <div>
        <label class="text-xs font-semibold text-slate-600">GitHub Owner (username/org)</label>
        <input id="ghOwner" type="text" placeholder="vd: learntoleap" class="w-full mt-1 px-3 py-2 border rounded-lg" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600">Tên repository</label>
        <input id="ghRepo" type="text" placeholder="vd: learn-to-leap-shop" class="w-full mt-1 px-3 py-2 border rounded-lg" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600">Branch</label>
        <input id="ghBranch" type="text" value="main" class="w-full mt-1 px-3 py-2 border rounded-lg" />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600">Personal Access Token (PAT)</label>
        <input id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx" class="w-full mt-1 px-3 py-2 border rounded-lg" />
        <p class="text-[11px] text-slate-500 mt-1">Tạo PAT có quyền <code>repo</code> tại github.com/settings/tokens. Token chỉ lưu trong sessionStorage, không gửi đi đâu khác.</p>
      </div>
      <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="rememberToken" /> Nhớ token trong trình duyệt này (localStorage)</label>
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg">Đăng nhập</button>
      <div id="loginError" class="text-sm text-red-600 hidden"></div>
    </div>

    <div class="mt-6 pt-6 border-t text-center">
      <a href="index.html" class="text-sm text-slate-500 hover:text-blue-600">← Về trang chủ shop</a>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
  <header class="bg-white shadow-sm sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg flex items-center justify-center text-white font-extrabold">L</div>
        <div>
          <div class="font-extrabold text-blue-700">LtL Shop Admin</div>
          <div class="text-xs text-slate-500" id="repoInfo"></div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span id="saveStatus" class="text-xs text-slate-500"></span>
        <a href="index.html" target="_blank" class="text-sm text-slate-600 hover:text-blue-600">↗ Xem shop</a>
        <button onclick="logout()" class="text-sm text-red-600 hover:text-red-700">Đăng xuất</button>
      </div>
    </div>
    <div class="max-w-7xl mx-auto px-4 border-t flex gap-1">
      <button onclick="switchTab('products')" id="tabProducts" class="px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-700">Sản phẩm</button>
      <button onclick="switchTab('categories')" id="tabCategories" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-600 hover:text-blue-600">Danh mục</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- PRODUCTS TAB -->
    <div id="paneProducts">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Sản phẩm (<span id="productCount">0</span>)</h2>
        <div class="flex gap-2">
          <button onclick="openBulkImport()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 py-2 rounded-lg">📥 Nhập hàng loạt</button>
          <button onclick="newProduct()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg">+ Thêm sản phẩm</button>
        </div>
      </div>
      <div id="productList" class="space-y-2"></div>
    </div>

    <!-- CATEGORIES TAB -->
    <div id="paneCategories" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Danh mục (<span id="catCount">0</span>)</h2>
        <button onclick="newCategory()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg">+ Thêm danh mục</button>
      </div>
      <div id="categoryList" class="space-y-2"></div>
    </div>
  </main>
</div>

<!-- EDITOR MODAL -->
<div id="editor" class="fixed inset-0 bg-black/60 z-50 hidden items-start justify-center p-4 overflow-y-auto">
  <div id="editorBox" class="bg-white rounded-2xl max-w-3xl w-full my-8 transition-all">
    <div id="editorContent"></div>
  </div>
</div>

<script src="assets/js/admin.js?v=20260619f"></script>
</body>
</html>
