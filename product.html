<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sản phẩm — Learn to Leap Shop</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe',
            400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce',
            800: '#6b21a8', 900: '#581c87'
          },
          accent: { 400: '#f472b6', 500: '#ec4899', 600: '#db2777' }
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Be Vietnam Pro', system-ui, sans-serif; }
</style>
</head>
<body class="bg-white text-slate-800">

<header class="bg-white shadow-sm sticky top-0 z-40 border-b border-purple-100">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
    <a href="index.html" class="flex items-center gap-3">
      <img src="images/logo.png" alt="Learn to Leap" class="h-10 md:h-12 w-auto" onerror="this.style.display='none'" />
    </a>
    <nav class="flex items-center gap-2 md:gap-3 text-sm font-medium">
      <a href="index.html" class="text-slate-700 hover:text-brand-600">← Tất cả sản phẩm</a>
      <a href="https://learntoleap.vn" target="_blank" rel="noopener" class="hidden sm:inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-brand-200 text-brand-700 hover:bg-brand-50">🏠 learntoleap.vn</a>
      <a href="https://learntoleap.edu.vn" target="_blank" rel="noopener" class="hidden md:inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-brand-200 text-brand-700 hover:bg-brand-50">🎓 learntoleap.edu.vn</a>
    </nav>
  </div>
</header>

<main id="productMain" class="max-w-5xl mx-auto px-4 py-8">
  <div id="loadingState" class="text-center text-slate-500 py-20">Đang tải...</div>
</main>

<section class="bg-gradient-to-br from-brand-800 via-brand-700 to-accent-600 text-white mt-10">
  <div class="max-w-5xl mx-auto px-4 py-8 text-center">
    <div class="font-extrabold text-lg mb-1">Learn to Leap</div>
    <p class="text-purple-100 text-sm">📧 contact@learntoleap.vn • 🌐 <a href="https://learntoleap.vn" target="_blank" rel="noopener" class="underline">learntoleap.vn</a> • 🎓 <a href="https://learntoleap.edu.vn" target="_blank" rel="noopener" class="underline">learntoleap.edu.vn</a></p>
  </div>
</section>

<script src="assets/js/product.js"></script>
</body>
</html>
